syntax = "proto3";

package payment;

option go_package = "payment/pb/";

message CreateOrderRequest {
    int64 user_id = 1;
    repeated Item items = 2;
    float total_price = 3;
}

message CreateOrderResponse {
    int64 order_id = 1;
    string message = 2;
}

message Item {
  string product_id = 1;
  int32 quantity = 2;
  float unit_price = 3;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {}
}